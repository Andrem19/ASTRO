name: Deploy to server via git fetch/reset

on:
  push:
    branches:
      - main

env:
  BRANCH: ${{ secrets.DEPLOY_BRANCH }}
  CONDA_BIN: /home/ubuntu/miniconda3/bin/conda
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
  SERVICE_NAME: astrology-mcp.service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH to server
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Update code on server
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          BRANCH="${BRANCH:-main}"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@${{ secrets.DEPLOY_HOST }}" \
            "set -euo pipefail
             cd '$DEPLOY_PATH'

             git remote set-url origin git@github-astro:Andrem19/ASTRO.git
             git fetch --prune origin '$BRANCH'
             git reset --hard
             git clean -fdx \
               -e .env \
               -e .env.* \
               -e data/ \
               -e data/** \
               -e backups/ \
               -e backups/**
             git checkout -B '$BRANCH' 'origin/$BRANCH'
             git reset --hard 'origin/$BRANCH'
            "

      - name: Install dependencies and run migrations
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@${{ secrets.DEPLOY_HOST }}" \
            "set -euo pipefail
             cd '$DEPLOY_PATH'

             '$CONDA_BIN' run -n astro python -m pip install -e .
             '$CONDA_BIN' run -n astro alembic upgrade head
            "

      - name: Restart astrology service
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@${{ secrets.DEPLOY_HOST }}" \
            "set -euo pipefail
             sudo -n systemctl restart '$SERVICE_NAME'
             sudo -n systemctl is-active --quiet '$SERVICE_NAME'
            "

      - name: Verify MCP tool registry
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@${{ secrets.DEPLOY_HOST }}" \
            "set -euo pipefail
             cd '$DEPLOY_PATH'
             '$CONDA_BIN' run -n astro python -c \"import asyncio; from astrology_mcp.mcp_server import create_mcp_server; tools=asyncio.run(create_mcp_server().list_tools()); names={tool.name for tool in tools}; print(sorted(names)); assert 'send_telegram_text_as_pdf' in names; assert 'astro1_send_telegram_text_as_pdf' in names; assert 'astro1_health_check' in names; assert 'astro1_get_profile_by_name' in names; assert 'astro1_calculate_profile_natal_chart' in names; assert 'calculate_profile_life_period_overview' in names; assert 'astro1_calculate_profile_life_period_overview' in names; assert 'send_telegram_message' not in names; assert 'send_telegram_text' not in names; assert 'send_telegram_markdown' not in names; assert 'send_telegram_pdf' not in names; assert 'send_telegram_image' not in names; assert 'telegram_outbox_info' not in names; assert 'astro1_send_telegram_pdf' not in names; assert 'calculate_profile_day_forecast' in names; assert 'get_profile_by_name' in names\"
            "

      - name: Show deployed commit
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@${{ secrets.DEPLOY_HOST }}" \
            "cd '$DEPLOY_PATH' && git --no-pager log -1 --oneline"
