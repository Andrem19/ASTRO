name: Deploy to server via rsync

on:
  push:
    branches:
      - main

env:
  DEPLOY_PATH: /home/ubuntu/ASTRO
  SERVICE_NAME: astrology-mcp

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH to server
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          if [ -z "$DEPLOY_USER" ]; then
            DEPLOY_USER="ubuntu"
          fi

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '$DEPLOY_PATH'"

      - name: Copy project to server
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          if [ -z "$DEPLOY_USER" ]; then
            DEPLOY_USER="ubuntu"
          fi

          rsync -az --delete \
            --include='.env.example' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='data/' \
            --exclude='backups/' \
            --exclude='*.sqlite' \
            --exclude='*.sqlite3' \
            --exclude='*.db' \
            --exclude='*.db3' \
            --exclude='*.sqlite-shm' \
            --exclude='*.sqlite-wal' \
            --exclude='*.sqlite3-shm' \
            --exclude='*.sqlite3-wal' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            --exclude='__pycache__/' \
            --exclude='.pytest_cache/' \
            --exclude='.ruff_cache/' \
            --exclude='.mypy_cache/' \
            --exclude='*.egg-info/' \
            --exclude='logs/' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            ./ "$DEPLOY_USER@${{ secrets.DEPLOY_HOST }}:$DEPLOY_PATH/"

      - name: Restart astrology service
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          if [ -z "$DEPLOY_USER" ]; then
            DEPLOY_USER="ubuntu"
          fi

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@${{ secrets.DEPLOY_HOST }}" \
            "set -euo pipefail
             sudo -n systemctl restart '$SERVICE_NAME'
             sudo -n systemctl is-active --quiet '$SERVICE_NAME'
            "

      - name: Show deployed files
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          if [ -z "$DEPLOY_USER" ]; then
            DEPLOY_USER="ubuntu"
          fi

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@${{ secrets.DEPLOY_HOST }}" \
            "cd '$DEPLOY_PATH' && find . -maxdepth 2 -type f | sort | head -80"
